server:
  port: 8082
  servlet:
    context-path: /api

spring:
  application:
    name: education
  profiles:
    active: prod
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true

app:
  auth:
    token-expire-seconds: 86400
